name: CI
on:
    pull_request:
        types: [opened, synchronize, reopened]
jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "24"
            - run: apt install -y mesa-common-dev libxi-dev
            - run: npm ci
            - run: npm test -- --passWithNoTests
              env:
                  CI: true
            - run: npm pack
